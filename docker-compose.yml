services:
  db:
    image: mariadb:latest
    container_name: arisrifas-db
    environment:
      - MYSQL_ROOT_PASSWORD=changeme
      - MYSQL_DATABASE=arisrifas
      - MYSQL_USER=naren
      - MYSQL_PASSWORD=1063616908
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: arisrifas-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: arisrifas-adminer
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db

  # app service intentionally omitted to avoid port conflicts with local dev backend.

volumes:
  db-data:
  redis-data:
